name: Deploy → Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hostinger (production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key & config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Write ssh config: persistent ControlMaster so all steps share one TCP connection
          cat >> ~/.ssh/config <<EOF
          Host hostinger-cv
            HostName ${{ secrets.HOSTINGER_HOST }}
            Port ${{ secrets.HOSTINGER_PORT }}
            User ${{ secrets.HOSTINGER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ControlMaster auto
            ControlPath ~/.ssh/ctrl-%C
            ControlPersist 60s
          EOF
          # Open the master connection
          ssh -fNT hostinger-cv

      - name: Sync files via rsync
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/app/public/chat-uploads' \
            --exclude='database/database.sqlite' \
            -e "ssh -o ControlPath=~/.ssh/ctrl-%C" \
            ./ \
            hostinger-cv:${{ secrets.HOSTINGER_DEPLOY_PATH }}/

      - name: Post-deploy artisan commands
        run: |
          ssh hostinger-cv "
            cd ${{ secrets.HOSTINGER_DEPLOY_PATH }}
            php artisan config:clear
            php artisan view:clear
            php artisan route:clear
            php artisan optimize
            echo '✅ Production deploy OK'
          "

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://andersonmares.xyz/cv/)
          echo "Production HTTP: $STATUS"
          [ "$STATUS" = "200" ] || (echo "SMOKE TEST FAILED: got $STATUS" && exit 1)
