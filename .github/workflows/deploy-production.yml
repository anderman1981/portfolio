name: Deploy → Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Hostinger (production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync files via rsync
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/app/public/chat-uploads' \
            --exclude='database/database.sqlite' \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_DEPLOY_PATH }}/

      - name: Post-deploy commands
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} \
              "cd ${{ secrets.HOSTINGER_DEPLOY_PATH }} && \
               php artisan config:clear && \
               php artisan view:clear && \
               php artisan route:clear && \
               php artisan optimize && \
               echo '✅ Production deploy OK'"

      - name: Smoke test
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://andersonmares.xyz/cv/)
          echo "Production HTTP: $STATUS"
          [ "$STATUS" = "200" ] || (echo "SMOKE TEST FAILED: got $STATUS" && exit 1)
