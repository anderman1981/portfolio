name: Deploy → Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Deploy to Hostinger (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key & config
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host hostinger-cv
            HostName ${{ secrets.HOSTINGER_HOST }}
            Port ${{ secrets.HOSTINGER_PORT }}
            User ${{ secrets.HOSTINGER_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ControlMaster auto
            ControlPath ~/.ssh/ctrl-%C
            ControlPersist 120s
          EOF
          ssh -fNT hostinger-cv

      - name: Sync files via rsync
        run: |
          rsync -az --delete \
            --ignore-errors \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.env' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            --exclude='storage/app/public/chat-uploads' \
            --exclude='database/database.sqlite' \
            --exclude='public/js/filament' \
            --exclude='public/css/filament' \
            -e "ssh -o ControlPath=~/.ssh/ctrl-%C" \
            ./ \
            hostinger-cv:${{ secrets.HOSTINGER_DEPLOY_PATH }}/ || [ $? -eq 24 ]

      - name: Install/update Composer dependencies
        run: |
          ssh hostinger-cv "
            cd ${{ secrets.HOSTINGER_DEPLOY_PATH }}
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev 2>&1 | tail -5
          "

      - name: Post-deploy artisan commands
        run: |
          ssh hostinger-cv "
            cd ${{ secrets.HOSTINGER_DEPLOY_PATH }}
            php artisan config:clear
            php artisan view:clear
            php artisan route:clear
            php artisan event:clear
            php artisan config:cache
            php artisan view:cache
            echo 'Staging deploy OK'
          "
